name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

# Serialize runs that target the same ref so two near-simultaneous merges to
# main can't race each other to upload to Azure SWA (which would otherwise let
# the slower-finishing deploy of an older commit overwrite the faster-finishing
# deploy of a newer commit). Grouping by github.ref means:
#   - all push:main runs share one group  -> prod deploys run strictly in order
#   - each PR has its own group           -> different PRs still build in parallel
# cancel-in-progress: false so an in-flight upload is never killed mid-deploy.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false


jobs:
  build_and_deploy_job:
    # Run for pushes to main, and for PRs only when the head is in this same repo.
    # Fork PRs are handled separately by deploy-fork.yml after a maintainer applies
    # the "Accept for Deploy" label.
    if: |
      (github.event_name == 'push') ||
      (github.event_name == 'pull_request'
       && github.event.action != 'closed'
       && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Install MkDocs
        run: pip install -r requirements.txt
      - name:  build documentation 
        run: mkdocs build   
      - name: copy config file
        run: cp staticwebapp.config.json site   
      - name: Deploy to azure
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WONDERFUL_SKY_012B9BC03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "/site" # App source code path
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.repository == 'chili-publish/grafx-documentation' && github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WONDERFUL_SKY_012B9BC03 }}
          action: "close"
