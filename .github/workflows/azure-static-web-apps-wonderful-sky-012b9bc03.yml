name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

# Serialize runs that target the same ref so two near-simultaneous merges to
# main can't race each other to upload to Azure SWA (which would otherwise let
# the slower-finishing deploy of an older commit overwrite the faster-finishing
# deploy of a newer commit). Grouping by github.ref means:
#   - all push:main runs share one group  -> prod deploys run strictly in order
#   - each PR has its own group           -> different PRs still build in parallel
# cancel-in-progress: false so an in-flight upload is never killed mid-deploy.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Least-privilege default for GITHUB_TOKEN; per-job blocks below grant only
# what's actually needed.
permissions: {}


jobs:
  build_and_deploy_job:
    # Run for pushes to main, and for PRs only when the head is in this same repo.
    # Fork PRs are handled separately by deploy-fork.yml after a maintainer applies
    # the "Accept for Deploy" label.
    if: |
      (github.event_name == 'push') ||
      (github.event_name == 'pull_request'
       && github.event.action != 'closed'
       && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    # Checkout needs `contents: read`. SWA action posts preview-URL comment on
    # PRs, which needs `pull-requests: write`. Nothing else GITHUB_TOKEN here.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
          # GITHUB_TOKEN is not used by any later step; don't persist it in
          # .git/config where it could leak to other tooling.
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Install MkDocs
        run: pip install -r requirements.txt
      - name: Build documentation
        run: mkdocs build

      # ===== CDN offload pipeline (DT-973) =====
      # Binary assets (png/jpg/svg/gif/mp4/webm/pdf/webp) are served from
      # docs-cdn.chiligrafx.com; the SWA artifact only carries HTML/CSS/JS.
      # See scripts/cdn/ for the underlying tools and the design notes in
      # the DT-973 ticket.
      #
      # Upload strategy (incremental — DT-973 follow-up):
      #   main -> `azcopy sync` against the `assets` container. Only new or
      #           changed blobs (by MD5) are uploaded; orphans are deleted by
      #           sync itself. A dry-run gate aborts if more than 10 blobs
      #           would be deleted.
      #   PRs  -> assets whose MD5 matches a prod blob are NOT uploaded at
      #           all; their HTML refs are rewritten straight to prod
      #           /assets/. Only PR-specific (new or changed) assets are
      #           uploaded to staging/pr-<N>/assets/ and rewritten to that
      #           prefix. Staging is purged by the 30-day lifecycle policy.
      #
      # azcopy notes: mtimes are meaningless in CI (fresh checkout + build),
      # so sync MUST use --compare-hash=MD5. That requires Content-MD5 on the
      # destination blobs — every upload path sets --put-md5, and the one-time
      # backfill lives in cdn-md5-baseline.yml (workflow_dispatch).

      - name: Compute CDN target
        id: cdn
        run: |
          if [ "$GITHUB_EVENT_NAME" = "push" ] && [ "$GITHUB_REF" = "refs/heads/main" ]; then
            echo "is_main=true" >> "$GITHUB_OUTPUT"
          else
            PR_NUM="${{ github.event.pull_request.number }}"
            echo "is_main=false" >> "$GITHUB_OUTPUT"
            echo "staging_dest=staging/pr-$PR_NUM/assets" >> "$GITHUB_OUTPUT"
            echo "pr_prefix=/staging/pr-$PR_NUM/assets/" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure Login
        uses: azure/login@v3
        with:
          # No `subscriptionId` in the creds JSON: the Product CI/CD SP has
          # only data-plane (Storage Blob Data Contributor) access on the
          # docs-cdn storage account; it isn't enrolled in any subscription's
          # IAM. If we pass subscriptionId, azure/login adds `--subscription`
          # to `az login` and fails because the SP can't see that
          # subscription. `allow-no-subscriptions: true` lets login succeed
          # without any subscription context. All our `az storage blob`
          # calls use --auth-mode login (data plane) and target a specific
          # account by name, so no subscription is needed.
          creds: >-
            {
              "clientId":       "${{ vars.AZ_AD_CLIENT_ID_CP_PDT_INT_CICD_SP }}",
              "clientSecret":   "${{ secrets.AZ_AD_CLIENT_SECRET_CP_PDT_INT_CICD_SP }}",
              "tenantId":       "${{ vars.AZ_TENANT_ID }}"
            }
          allow-no-subscriptions: true

      - name: Collect CDN assets from site/ into a staging dir
        run: python3 scripts/cdn/collect_assets.py site/ build/cdn-upload/

      # ---- Main: incremental sync with dry-run safety gate ----

      - name: Sync dry run + safety gate (main only)
        if: steps.cdn.outputs.is_main == 'true'
        env:
          AZCOPY_AUTO_LOGIN_TYPE: AZCLI
        run: |
          set -euo pipefail
          # Guard 1: a sane build should have >= 500 in-scope files.
          file_count=$(find build/cdn-upload -type f | wc -l)
          echo "Files in build: $file_count"
          if [ "$file_count" -lt 500 ]; then
            echo "::error::Refusing to sync: build has fewer than 500 in-scope files ($file_count). Aborting before any changes."
            exit 1
          fi
          azcopy sync build/cdn-upload/ \
            "https://${{ vars.DOCS_CDN_STORAGE_ACCOUNT_NAME }}.blob.core.windows.net/assets" \
            --compare-hash=MD5 --put-md5 --delete-destination=true \
            --dry-run --output-type text | tee sync-dryrun.txt
          delete_count=$(grep -c '^DRYRUN: remove' sync-dryrun.txt || true)
          upload_count=$(grep -c '^DRYRUN: copy' sync-dryrun.txt || true)
          echo "Sync plan: $upload_count upload(s), $delete_count deletion(s)"
          # Guard 2: a normal main build deletes ~0-5 files; a sudden spike
          # almost certainly indicates a bug in the build or the baseline.
          if [ "$delete_count" -gt 10 ]; then
            echo "::error::Refusing to sync: dry run would delete $delete_count blobs (>10). Aborting before any changes."
            exit 1
          fi

      - name: Sync assets to CDN (main only)
        if: steps.cdn.outputs.is_main == 'true'
        env:
          AZCOPY_AUTO_LOGIN_TYPE: AZCLI
        run: |
          azcopy sync build/cdn-upload/ \
            "https://${{ vars.DOCS_CDN_STORAGE_ACCOUNT_NAME }}.blob.core.windows.net/assets" \
            --compare-hash=MD5 --put-md5 --delete-destination=true

      # ---- PRs: upload only assets that differ from the prod baseline ----
      # Everything that already exists in /assets/ with an identical MD5 is
      # served from prod; only genuinely new/changed assets go to staging.
      # No orphan handling needed -- the lifecycle policy on `pr-*` purges
      # the staging container after 30 days.

      - name: List prod asset baseline (PR only)
        if: steps.cdn.outputs.is_main != 'true'
        run: |
          az storage blob list \
            --account-name "${{ vars.DOCS_CDN_STORAGE_ACCOUNT_NAME }}" \
            --container-name assets \
            --auth-mode login \
            --num-results "*" \
            --query "[].{name:name, md5:properties.contentSettings.contentMd5}" \
            -o json > build/prod-assets.json

      - name: Split PR-specific assets from prod baseline (PR only)
        if: steps.cdn.outputs.is_main != 'true'
        run: |
          python3 scripts/cdn/diff_assets.py \
            build/cdn-upload/ build/prod-assets.json build/pr-assets.txt

      - name: Upload PR-specific assets to staging (PR only)
        if: steps.cdn.outputs.is_main != 'true'
        env:
          AZCOPY_AUTO_LOGIN_TYPE: AZCLI
        run: |
          if [ ! -s build/pr-assets.txt ]; then
            echo "No PR-specific assets -- nothing to upload."
            exit 0
          fi
          azcopy copy "build/cdn-upload/*" \
            "https://${{ vars.DOCS_CDN_STORAGE_ACCOUNT_NAME }}.blob.core.windows.net/${{ steps.cdn.outputs.staging_dest }}/" \
            --recursive --put-md5 --overwrite=true

      # ---- Rewrite HTML refs ----
      # main: everything points at /assets/.
      # PRs:  default is prod /assets/; only the PR-specific assets listed in
      #       build/pr-assets.txt are overridden to the staging prefix.

      - name: Rewrite asset references to CDN URLs (main only, strict)
        if: steps.cdn.outputs.is_main == 'true'
        run: |
          python3 scripts/cdn/rewrite_urls.py \
            site/ \
            https://docs-cdn.chiligrafx.com \
            /assets/ \
            --strict

      - name: Rewrite asset references to CDN URLs (PR, strict)
        if: steps.cdn.outputs.is_main != 'true'
        run: |
          python3 scripts/cdn/rewrite_urls.py \
            site/ \
            https://docs-cdn.chiligrafx.com \
            /assets/ \
            --override-list build/pr-assets.txt \
            --override-prefix "${{ steps.cdn.outputs.pr_prefix }}" \
            --strict

      - name: Strip binary assets from SWA upload
        run: python3 scripts/cdn/strip_assets.py site/

      # ===== End CDN offload pipeline =====

      - name: Copy SWA config file
        run: cp staticwebapp.config.json site
      - name: Deploy to azure
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WONDERFUL_SKY_012B9BC03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "/site" # App source code path
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.repository == 'chili-publish/grafx-documentation' && github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    # SWA close action uses its own API token; no GITHUB_TOKEN scopes needed.
    permissions: {}
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WONDERFUL_SKY_012B9BC03 }}
          action: "close"
