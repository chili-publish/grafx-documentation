name: Deploy fork PR to dev

on:
  workflow_run:
    workflows: [Apply Deploy Label]
    types:
      - completed

# workflow_run runs with a restricted GITHUB_TOKEN by default.
# We explicitly grant:
#   actions: read         -> required by actions/download-artifact@v8 to fetch
#                            the 'pr' artifact from the upstream Apply Deploy Label run.
#   contents: read        -> required by actions/checkout to fetch the PR head SHA.
#   pull-requests: write  -> lets Azure/static-web-apps-deploy post the preview URL
#                            comment back on the PR.
permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  build_and_deploy_job:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    name: Build and Deploy Fork PR
    steps:
      - name: Download PR info
        uses: actions/download-artifact@v8
        with:
          name: pr
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read PR info
        id: pr
        run: |
          echo "number=$(cat number)" >> $GITHUB_OUTPUT
          echo "sha=$(cat sha)"       >> $GITHUB_OUTPUT

      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.sha }}
          submodules: true
          # GITHUB_TOKEN is not used by any later git command; don't persist
          # it in .git/config where it could leak to other tooling.
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Install MkDocs
        run: pip install -r requirements.txt

      - name: Build documentation
        run: mkdocs build

      # ===== CDN offload pipeline (DT-973) =====
      # Fork PRs always upload to the `staging` container, prefixed by PR
      # number (matches the same-repo PR layout from the main workflow).
      # No orphan-delete step here -- staging is per-PR and gets cleaned by
      # the lifecycle policy.

      - name: Azure Login
        uses: azure/login@v2
        with:
          # See azure-static-web-apps-...yml for the full explanation: our SP
          # has only data-plane access, no subscription IAM membership, so
          # we omit subscriptionId from creds and set allow-no-subscriptions.
          creds: >-
            {
              "clientId":       "${{ vars.AZ_AD_CLIENT_ID_CP_PDT_INT_CICD_SP }}",
              "clientSecret":   "${{ secrets.AZ_AD_CLIENT_SECRET_CP_PDT_INT_CICD_SP }}",
              "tenantId":       "${{ vars.AZ_TENANT_ID }}"
            }
          allow-no-subscriptions: true

      - name: Collect CDN assets from site/ into a staging dir
        run: python3 scripts/cdn/collect_assets.py site/ build/cdn-upload/

      - name: Upload assets to staging blob
        uses: azure/cli@v2
        with:
          inlineScript: |
            az storage blob upload-batch \
              --account-name "${{ vars.DOCS_CDN_STORAGE_ACCOUNT_NAME }}" \
              --destination staging \
              --destination-path "pr-${{ steps.pr.outputs.number }}/assets/" \
              --source build/cdn-upload/ \
              --overwrite true \
              --auth-mode login

      - name: Rewrite asset references in HTML to CDN URLs (strict)
        run: |
          python3 scripts/cdn/rewrite_urls.py \
            site/ \
            https://docs-cdn.chiligrafx.com \
            "/staging/pr-${{ steps.pr.outputs.number }}/assets/" \
            --strict

      - name: Strip binary assets from SWA upload
        run: python3 scripts/cdn/strip_assets.py site/

      # ===== End CDN offload pipeline =====

      - name: Copy config file
        run: cp staticwebapp.config.json site

      - name: Deploy to Azure
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WONDERFUL_SKY_012B9BC03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /site
          deployment_environment: fork-preview
          production_branch: main

      # The Azure SWA action only auto-comments on PRs when it runs under a
      # pull_request event context. We trigger via workflow_run, so we post
      # the staging URL ourselves. pull-requests: write is granted above.
      - name: Comment staging URL on PR
        uses: actions/github-script@v9
        env:
          DEPLOY_URL: ${{ steps.builddeploy.outputs.static_web_app_url }}
        with:
          script: |
            const prNumber = Number('${{ steps.pr.outputs.number }}');
            const sha = '${{ steps.pr.outputs.sha }}';
            const shortSha = sha.substring(0, 7);
            const url = process.env.DEPLOY_URL;
            const body = [
              `Staging deploy for \`${shortSha}\` is live: ${url}`,
              ``,
              `_Note: this is the shared \`fork-preview\` environment — whichever fork PR most recently received the \`Accept for Deploy\` label is what you'll see at this URL. This is **not** production._`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
