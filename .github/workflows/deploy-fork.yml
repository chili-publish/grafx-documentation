name: Deploy fork PR to dev

on:
  workflow_run:
    workflows: [Apply Deploy Label]
    types:
      - completed

# workflow_run runs with a restricted GITHUB_TOKEN by default.
# We explicitly grant:
#   actions: read         -> required by actions/download-artifact@v8 to fetch
#                            the 'pr' artifact from the upstream Apply Deploy Label run.
#   contents: read        -> required by actions/checkout to fetch the PR head SHA.
#   pull-requests: write  -> lets Azure/static-web-apps-deploy post the preview URL
#                            comment back on the PR.
permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  build_and_deploy_job:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    name: Build and Deploy Fork PR
    steps:
      - name: Download PR info
        uses: actions/download-artifact@v8
        with:
          name: pr
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read PR info
        id: pr
        run: |
          echo "number=$(cat number)" >> $GITHUB_OUTPUT
          echo "sha=$(cat sha)"       >> $GITHUB_OUTPUT

      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.sha }}
          submodules: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Install MkDocs
        run: pip install -r requirements.txt

      - name: Build documentation
        run: mkdocs build

      - name: Copy config file
        run: cp staticwebapp.config.json site

      - name: Deploy to Azure
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WONDERFUL_SKY_012B9BC03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /site

      # The Azure SWA action only auto-comments on PRs when it runs under a
      # pull_request event context. We trigger via workflow_run, so we post
      # the staging URL ourselves. pull-requests: write is granted above.
      - name: Comment staging URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ steps.pr.outputs.number }}');
            const sha = '${{ steps.pr.outputs.sha }}';
            const shortSha = sha.substring(0, 7);
            const url = 'https://wonderful-sky-012b9bc03.1.azurestaticapps.net';
            const body = [
              `Staging deploy for \`${shortSha}\` is live: ${url}`,
              ``,
              `_Note: this staging environment is shared across fork PRs — whichever PR most recently received the \`Accept for Deploy\` label is what you'll see there._`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
